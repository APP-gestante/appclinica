<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Gerar Vida – Entrar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #F4F6F4;
            --primary: #8DAA91;
            --primary-light: #C5D5C8;
            --primary-dk: #5E7E63;
            --accent: #E5987D;
            --dark-card: #301B28;
            --text: #2D312E;
            --text-mid: #6B7471;
            --text-inactive: #A0AAB2;
            --white: #ffffff;
            --radius: 20px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            height: 100dvh;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── TOP SECTION (dark) ── */
        .top-section {
            background: var(--dark-card);
            padding: max(env(safe-area-inset-top, 16px), 56px) 32px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            flex-shrink: 0;
        }

        /* Logo placeholder */
        .logo-wrap {
            width: 72px;
            height: 72px;
            border-radius: 22px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            box-shadow: 0 8px 24px rgba(141,170,145,0.35);
        }
        .logo-wrap svg {
            width: 36px; height: 36px;
            stroke: white;
            fill: none; stroke-width: 2;
            stroke-linecap: round; stroke-linejoin: round;
        }

        .app-name {
            font-size: 28px;
            font-weight: 800;
            color: var(--white);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .app-tagline {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            font-weight: 500;
            text-align: center;
        }

        /* ── BOTTOM SECTION ── */
        .bottom-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 32px 24px max(env(safe-area-inset-bottom, 24px), 32px);
            overflow-y: auto;
        }

        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-inactive);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            text-align: center;
        }

        /* ── ROLE CARDS ── */
        .role-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .role-card {
            background: var(--white);
            border-radius: 20px;
            padding: 20px 20px;
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            border: 2px solid transparent;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
            transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .role-card:active {
            transform: scale(0.98);
            box-shadow: 0 1px 8px rgba(0,0,0,0.06);
        }

        .role-card.patient:hover, .role-card.patient:focus {
            border-color: var(--accent);
        }
        .role-card.doctor:hover, .role-card.doctor:focus {
            border-color: var(--primary);
        }
        .role-card.secretary:hover, .role-card.secretary:focus {
            border-color: var(--primary-dk);
        }

        /* Subtle background tint */
        .role-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 80px; height: 80px;
            border-radius: 50%;
            opacity: 0.06;
            transform: translate(20px, -20px);
        }
        .role-card.patient::before { background: var(--accent); }
        .role-card.doctor::before { background: var(--primary); }
        .role-card.secretary::before { background: var(--dark-card); }

        .role-icon {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 26px;
            line-height: 1;
        }
        .role-icon.patient-icon { background: rgba(229,152,125,0.15); }
        .role-icon.doctor-icon  { background: rgba(141,170,145,0.18); }
        .role-icon.sec-icon     { background: rgba(48,27,40,0.08); }

        .role-text { flex: 1; }
        .role-title {
            font-size: 17px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.2px;
            margin-bottom: 4px;
        }
        .role-desc {
            font-size: 12.5px;
            color: var(--text-mid);
            line-height: 1.4;
            font-weight: 500;
        }

        .role-arrow {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .role-card.patient .role-arrow { background: rgba(229,152,125,0.15); }
        .role-card.doctor  .role-arrow { background: rgba(141,170,145,0.18); }
        .role-card.secretary .role-arrow { background: rgba(48,27,40,0.08); }

        .role-arrow svg {
            width: 16px; height: 16px;
            fill: none; stroke-width: 2.5;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .role-card.patient .role-arrow svg { stroke: var(--accent); }
        .role-card.doctor  .role-arrow svg { stroke: var(--primary-dk); }
        .role-card.secretary .role-arrow svg { stroke: var(--dark-card); }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            font-size: 11px;
            color: var(--text-inactive);
            margin-top: 20px;
            flex-shrink: 0;
        }

        /* ── ENTRY ANIMATION ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .role-card {
            animation: fadeUp 0.35s ease both;
        }
        .role-card:nth-child(1) { animation-delay: 0.05s; }
        .role-card:nth-child(2) { animation-delay: 0.12s; }
        .role-card:nth-child(3) { animation-delay: 0.19s; }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .top-section { animation: fadeDown 0.4s ease both; }
    </style>
</head>

<body>

    <!-- TOP -->
    <div class="top-section">
        <div class="logo-wrap">
            <svg viewBox="0 0 24 24">
                <!-- Heart with pulse line -->
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
        </div>
        <h1 class="app-name">Gerar Vida</h1>
        <p class="app-tagline">Pré-natal digital para clínicas privadas</p>
    </div>

    <!-- BOTTOM -->
    <div class="bottom-section">

        <p class="section-label">Entrar como</p>

        <div class="role-list">

            <!-- PACIENTE -->
            <a href="index.html" class="role-card patient">
                <div class="role-icon patient-icon">🤰</div>
                <div class="role-text">
                    <p class="role-title">Paciente</p>
                    <p class="role-desc">Acompanhe sua gravidez, consultas e exames</p>
                </div>
                <div class="role-arrow">
                    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
            </a>

            <!-- MÉDICO -->
            <a href="dashboard_medico.html" class="role-card doctor">
                <div class="role-icon doctor-icon">👩‍⚕️</div>
                <div class="role-text">
                    <p class="role-title">Médico(a)</p>
                    <p class="role-desc">Gerencie pacientes, agenda e prontuários</p>
                </div>
                <div class="role-arrow">
                    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
            </a>

            <!-- SECRETARIA -->
            <a href="dashboard_secretaria.html" class="role-card secretary">
                <div class="role-icon sec-icon">📋</div>
                <div class="role-text">
                    <p class="role-title">Secretaria / Time</p>
                    <p class="role-desc">Agenda, agendamentos e gestão da clínica</p>
                </div>
                <div class="role-arrow">
                    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
            </a>

        </div>

        <p class="footer">Gerar Vida · Versão 1.2.0</p>

    </div>

</body>
</html>
